<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZNT DATA Login</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2a44,#1e4d7b);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

h2{
margin-bottom:20px;
color:#0f2a44;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#ff9800;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e68900;
}

.error{
color:red;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>ZNT DATA Login</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p class="error" id="error"></p>

</div>

<script>

function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email === "admin@zntdata.com" && password === "1234"){

alert("Login Successful");

window.location.href="index.html";

}else{

document.getElementById("error").innerText = "Invalid Email or Password";

}

}

</script>

</body>
</html>
