<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZNT DATA Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1d4ed8);
color:white;
}

/* Card */

.card{
width:380px;
padding:40px;
border-radius:12px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
text-align:center;
}

.card h2{
margin-bottom:25px;
font-size:26px;
}

/* Inputs */

input{
width:100%;
padding:13px;
margin:10px 0;
border:none;
border-radius:6px;
background:#1f2937;
color:white;
font-size:14px;
}

input::placeholder{
color:#9ca3af;
}

/* Button */

button{
width:100%;
padding:13px;
margin-top:15px;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#facc15,#f59e0b);
font-size:16px;
font-weight:bold;
cursor:pointer;
color:black;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* Login link */

.login{
margin-top:15px;
font-size:14px;
}

.login a{
color:#60a5fa;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Create ZNT DATA Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<input type="text" placeholder="Country">

<input type="text" placeholder="City">

<button>Create Account</button>

<div class="login">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

</body>
</html>
