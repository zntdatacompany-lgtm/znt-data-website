<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZNT DATA Signup</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#0f172a,#1d4ed8);
color:white;
}

.card{
background:#111827;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:6px;
background:#1f2937;
color:white;
}

input::placeholder{
color:#9ca3af;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.login{
text-align:center;
margin-top:15px;
font-size:14px;
}

.login a{
color:#60a5fa;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<input type="text" placeholder="Country">

<input type="text" placeholder="City">

<button>Create Account</button>

<div class="login">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

</body>

</html>
