<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZNT DATA Signup</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f2a44;
color:white;
}

/* Signup Card */

.card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

h2{
text-align:center;
margin-bottom:25px;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:rgba(255,255,255,0.1);
color:white;
}

input::placeholder{
color:#cbd5e1;
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:orange;
color:black;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ffb347;
}

/* Login link */

.login{
text-align:center;
margin-top:15px;
font-size:14px;
}

.login a{
color:#60a5fa;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Create ZNT DATA Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<input type="text" placeholder="Country">

<input type="text" placeholder="City">

<button>Create Account</button>

<div class="login">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

</body>

</html>
